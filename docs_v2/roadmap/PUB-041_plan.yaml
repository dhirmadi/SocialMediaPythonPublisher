version: 1
roadmap_id: PUB-041
summary: Vision cost optimization (1024px + low) + quality fallback + richer caption prompts.

repo_constraints:
  allowed:
    - publisher_v2/src/publisher_v2/services/ai.py
    - publisher_v2/src/publisher_v2/utils/images.py
    - publisher_v2/src/publisher_v2/config/schema.py
    - publisher_v2/src/publisher_v2/config/orchestrator_models.py
    - publisher_v2/src/publisher_v2/config/source.py
    - publisher_v2/src/publisher_v2/config/loader.py
    - publisher_v2/tests/**
    - docs_v2/roadmap/PUB-041_*
  excluded:
    - code_v1/**
    - docs_v1/**

acceptance_criteria:
  - AC-01: Resize 4000x6000 -> 683x1024, send as data URL.
  - AC-02: image_url dict carries detail = vision_detail.
  - AC-03: vision_max_dimension=0 -> presigned URL passed directly.
  - AC-04: 800x600 with max=1024 -> no upscale, still JPEG data URL.
  - AC-05: Aspect ratio preserved during resize.
  - AC-06: resize_image_bytes(data, max, q=85) helper in utils/images.
  - AC-07: AIServiceError + fallback enabled -> fallback fires with higher settings.
  - AC-08: vision_fallback_triggered WARNING logged.
  - AC-09: Fallback disabled or fallback fails -> AIServiceError raised.
  - AC-10: Fallback adds at most 1 additional OpenAI call chain.
  - AC-11: Both primary and fallback AIUsage returned.
  - AC-12: build_analysis_context includes lighting/composition/etc when non-None.
  - AC-13: None fields omitted.
  - AC-14: Strings truncated at 50 chars; aesthetic_terms capped at 10.
  - AC-15: nsfw/safety_labels/camera/clothing/background/subject never included.
  - AC-16: All three call sites use build_analysis_context.
  - AC-17: OpenAIConfig defaults: max_dim=1024, detail="low", fallback_enabled=True, fallback_max_dim=2048, fallback_detail="high".
  - AC-18: vision_detail validator rejects values outside {low,high,auto}.
  - AC-19: Orchestrator v2 payload maps vision fields into OpenAIConfig.
  - AC-20: OPENAI_SETTINGS JSON parses 5 vision fields.
  - AC-21: vision_max_dimension=0 + vision_detail="high" -> pre-PUB-041 behavior.

tasks:
  - phase1_config_resize
  - phase2_vision_analyzer
  - phase3_fallback
  - phase4_richer_prompts
  - phase5_tests_and_summary

quality_gates:
  coverage_affected: 0.80
  coverage_overall: 0.85
  preview_safe: true
