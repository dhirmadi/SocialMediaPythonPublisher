version: 1
roadmap_id: PUB-042
summary: Lock the grid panel controls and warn on navigation while the upload queue is processing.

repo_constraints:
  allowed:
    - publisher_v2/src/publisher_v2/web/templates/index.html
    - publisher_v2/tests/web/test_upload_queue_lock_ui.py
    - docs_v2/roadmap/PUB-042_*
    - docs_v2/roadmap/README.md
  excluded:
    - publisher_v2/src/publisher_v2/services/**
    - publisher_v2/src/publisher_v2/config/**

acceptance_criteria:
  - AC-01: Status banner element #upload-queue-status exists in queue panel header.
  - AC-02: setUploadLockState(locked) function exists and is invoked at start/end of processUploadQueue.
  - AC-03: Grid panel toggles .uploading-active class while locked; CSS rule defines locked visuals.
  - AC-04: Six grid controls receive disabled attribute while locked, cleared on unlock.
  - AC-05: beforeunload listener registered while locked, removed on unlock.
  - AC-06: selectGridItem confirms before navigation while uploadQueueProcessing is true.
  - AC-07: setUploadLockState(false) is called unconditionally when processUploadQueue completes.
  - AC-08: Failed-only entries do not lock the UI (uploadQueueProcessing=false).
  - AC-09: No regression to PUB-036/PUB-037 queue behaviors.

tasks:
  - write_spec
  - write_failing_tests
  - implement_html_js_css
  - run_quality_gates
  - write_summary

quality_gates:
  coverage_affected: 0.80
  coverage_overall: 0.85
  preview_safe: true
